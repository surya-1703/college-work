<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Student Information Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="header">
                <h1>Student Information Form</h1>
                <p>Please fill in your personal details</p>
            </div>

            <form id="studentForm" class="form">
                <!-- Personal Information Section -->
                <fieldset class="form-section">
                    <legend>Personal Information</legend>
                    
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="dob">Date of Birth *</label>
                            <input type="date" id="dob" name="dob" required>
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender *</label>
                            <select id="gender" name="gender" required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                                <option value="prefer-not">Prefer not to say</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" rows="3" placeholder="Street, City, State, Zip Code"></textarea>
                    </div>
                </fieldset>

                <!-- Academic Information Section -->
                <fieldset class="form-section">
                    <legend>Academic Information</legend>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="studentId">Student ID *</label>
                            <input type="text" id="studentId" name="studentId" required>
                        </div>
                        <div class="form-group">
                            <label for="rollNumber">Roll Number</label>
                            <input type="text" id="rollNumber" name="rollNumber">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="department">Department *</label>
                            <select id="department" name="department" required>
                                <option value="">Select Department</option>
                                <option value="cs">Computer Science</option>
                                <option value="it">Information Technology</option>
                                <option value="ec">Electronics & Communication</option>
                                <option value="ee">Electrical Engineering</option>
                                <option value="me">Mechanical Engineering</option>
                                <option value="ce">Civil Engineering</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="year">Year/Semester *</label>
                            <select id="year" name="year" required>
                                <option value="">Select Year</option>
                                <option value="1">1st Year</option>
                                <option value="2">2nd Year</option>
                                <option value="3">3rd Year</option>
                                <option value="4">4th Year</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="gpa">CGPA</label>
                            <input type="number" id="gpa" name="gpa" min="0" max="10" step="0.01" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="enrollment">Enrollment Status *</label>
                            <select id="enrollment" name="enrollment" required>
                                <option value="">Select Status</option>
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                                <option value="on-leave">On Leave</option>
                            </select>
                        </div>
                    </div>
                </fieldset>

                <!-- Contact Information Section -->
                <fieldset class="form-section">
                    <legend>Emergency Contact</legend>
                    
                    <div class="form-group">
                        <label for="emergencyName">Emergency Contact Name *</label>
                        <input type="text" id="emergencyName" name="emergencyName" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="emergencyPhone">Emergency Contact Number *</label>
                            <input type="tel" id="emergencyPhone" name="emergencyPhone" required>
                        </div>
                        <div class="form-group">
                            <label for="relationship">Relationship *</label>
                            <input type="text" id="relationship" name="relationship" placeholder="e.g., Parent, Guardian" required>
                        </div>
                    </div>
                </fieldset>

                <!-- Buttons -->
                <div class="form-buttons">
                    <button type="reset" class="btn btn-reset">Clear Form</button>
                    <button type="submit" class="btn btn-submit">Submit</button>
                </div>
            </form>

            <div id="successMessage" class="success-message" style="display: none;">
                <p>✓ Form submitted successfully!</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show success message
            document.getElementById('successMessage').style.display = 'block';
            
            // Hide success message after 3 seconds
            setTimeout(function() {
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
            
            // Optional: Log form data
            console.log('Form submitted with data:');
            const formData = new FormData(this);
            for (let [key, value] of formData.entries()) {
                console.log(`${key}: ${value}`);
            }
        });
    </script>
</body>
</html>
